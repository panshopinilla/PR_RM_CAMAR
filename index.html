<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>AR · Tambo de Camar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --acento:       #40D3B7;
            --acento-glow:  rgba(64, 211, 183, 0.35);
            --naranja:      #EB6242;
            --naranja-glow: rgba(235, 98, 66, 0.4);
            --dorado:       #C8973A;
            --crema:        #F5ECD7;
            --oscuro:       #0A0806;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: var(--oscuro);
            font-family: 'Lato', sans-serif;
            overflow: hidden;
        }

        /* ── VISOR 3D ── */
        model-viewer {
            width: 100%; height: 100%;
            --poster-color: transparent;
            background: radial-gradient(circle at center, #1a1612 0%, var(--oscuro) 100%);
        }

        /* ── INTERFAZ DE PREVISUALIZACIÓN (NUEVA) ── */
        #pantalla-previa {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 100;
            pointer-events: none; /* Permite tocar el modelo 3D a través de esta capa */
            transition: opacity 0.6s ease;
        }
        #pantalla-previa.oculto { opacity: 0; pointer-events: none; }
        
        /* Cabecera */
        .header-previa {
            background: linear-gradient(to bottom, rgba(10,8,6,0.9) 0%, transparent 100%);
            padding: 30px 20px 50px; text-align: center;
        }
        .header-previa h1 { font-family: 'Cinzel', serif; font-size: 22px; color: var(--crema); letter-spacing: 3px; margin-bottom: 8px; }
        .header-previa p { font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 300; letter-spacing: 1px; }

        /* Contenedor inferior (Instrucciones + Botón) */
        .footer-previa {
            background: linear-gradient(to top, rgba(10,8,6,0.95) 20%, transparent 100%);
            padding: 50px 20px max(env(safe-area-inset-bottom), 30px);
            display: flex; flex-direction: column; align-items: center;
            pointer-events: auto; /* Permite hacer clic en los controles */
        }
        
        .tarjeta-instrucciones {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 15px 20px; margin-bottom: 25px;
            backdrop-filter: blur(10px); max-width: 320px; text-align: center;
        }
        .tarjeta-instrucciones p { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.5; margin-bottom: 8px;}
        .tarjeta-instrucciones p:last-child { margin-bottom: 0; color: var(--acento); font-weight: 400;}

        /* ── BOTÓN AR ── */
        #boton-activar-ar {
            position: relative;
            background: var(--acento); color: #0A0806;
            border: none; border-radius: 50px;
            padding: 18px 44px;
            font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            display: flex; align-items: center; gap: 12px; white-space: nowrap;
            animation: pulso-acento 2.4s ease-in-out infinite;
            transition: transform .15s, opacity .3s;
        }
        #boton-activar-ar:active   { transform: scale(.96); }
        #boton-activar-ar.cargando { opacity: .55; pointer-events: none; animation: none; }
        #boton-activar-ar.sin-ar   { opacity: .4;  pointer-events: none; animation: none; font-size: 13px; }

        @keyframes pulso-acento {
            0%,100% { box-shadow: 0 0 0 0 var(--acento-glow), 0 8px 28px var(--acento-glow); }
            50%     { box-shadow: 0 0 0 14px transparent,      0 8px 28px var(--acento-glow); }
        }
        .icono-camara { width: 22px; height: 22px; display: inline-flex; }
        .icono-camara svg { width: 100%; height: 100%; fill: #0A0806; }

        /* ── LOADER ── */
        #loader {
            position: fixed; inset: 0;
            background: var(--oscuro);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 150; transition: opacity .6s ease;
        }
        #loader.oculto { opacity: 0; pointer-events: none; }
        .logo-img { width: clamp(130px, 40vw, 210px); height: auto; margin-bottom: 44px; animation: logo-glow 2.6s infinite; }
        @keyframes logo-glow {
            0%,100% { filter: drop-shadow(0 0 6px rgba(64,211,183,.3)); opacity: .82; }
            50% { filter: drop-shadow(0 0 16px rgba(64,211,183,.8)); opacity: 1; }
        }
        .barra-wrap { width: clamp(150px, 46vw, 230px); height: 2px; background: rgba(255,255,255,.07); border-radius: 2px; overflow: hidden; }
        .barra-fill { height: 100%; background: linear-gradient(90deg, var(--acento), #a8f0e8); width: 0%; transition: width .35s ease; }
        .barra-fill.sweep { width: 36% !important; animation: sweep 1.7s ease-in-out infinite; }
        @keyframes sweep { 0% { transform: translateX(-200%); } 100% { transform: translateX(500%); } }

        /* ── HUD AR ── */
        #hud-ar { position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0; transition: opacity .5s; }
        #hud-ar.visible { opacity: 1; }
        .esquina { position: absolute; width: 30px; height: 30px; border-color: var(--naranja); border-style: solid; opacity: .8; }
        .esquina.tl { top:22px; left:22px; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
        .esquina.tr { top:22px; right:22px; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
        .esquina.bl { bottom:22px; left:22px; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
        .esquina.br { bottom:22px; right:22px; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%) translateY(16px);
            background: rgba(10,8,6,.93); border: 1px solid var(--naranja); color: var(--crema);
            padding: 15px 22px; border-radius: 14px; font-size: 14px; text-align: center;
            z-index: 300; opacity: 0; pointer-events: none; transition: opacity .4s, transform .4s;
        }
        #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="loader">
        <img src="./assets/logo.png" alt="Tambo de Camar" class="logo-img" onerror="this.style.opacity='0'">
        <div class="barra-wrap">
            <div class="barra-fill sweep" id="barra-progreso"></div>
        </div>
    </div>

    <model-viewer
        id="visor-ar"
        src="https://pub-bc716f7cd22a44299b23bf184c837b0a.r2.dev/modelo_v3.glb"
        alt="Maqueta Tambo de Camar"
        ar
        ar-modes="scene-viewer quick-look"
        camera-controls
        auto-rotate
        rotation-per-second="15deg"
        interaction-prompt="none"
        ar-scale="auto"
        ar-placement="floor"
        loading="eager"
        reveal="auto"
        shadow-intensity="0.6">
        <button slot="ar-button" id="ar-button-nativo" style="display:none"></button>
    </model-viewer>

    <div id="pantalla-previa">
        <div class="header-previa">
            <h1>Tambo de Camar</h1>
            <p>Reconstrucción Virtual 3D</p>
        </div>
        
        <div class="footer-previa">
            <div class="tarjeta-instrucciones">
                <p>Explora el modelo arrastrando con un dedo. Usa dos dedos para acercarlo.</p>
                <p>Presiona el botón cuando estés frente a la maqueta real para iniciar la Realidad Aumentada.</p>
            </div>
            
            <button id="boton-activar-ar" class="cargando">
                <span class="icono-camara">
                    <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm7-12H5a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V6.2A3 3 0 0 0 19 3.2zm-7 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
                </span>
                <span id="boton-texto">Cargando…</span>
            </button>
        </div>
    </div>

    <div id="hud-ar">
        <div class="esquina tl"></div><div class="esquina tr"></div>
        <div class="esquina bl"></div><div class="esquina br"></div>
    </div>

    <div id="toast"><span id="toast-msg"></span></div>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <script>
    (function () {
        const viewer       = document.getElementById('visor-ar');
        const pantalla     = document.getElementById('pantalla-previa');
        const boton        = document.getElementById('boton-activar-ar');
        const botonTexto   = document.getElementById('boton-texto');
        const arBtn        = document.getElementById('ar-button-nativo');
        const loader       = document.getElementById('loader');
        const barra        = document.getElementById('barra-progreso');
        const toast        = document.getElementById('toast');
        const toastMsg     = document.getElementById('toast-msg');

        let toastTimer;
        let progresReal = false;
        let loaderEliminado = false;

        const timeoutCarga = setTimeout(() => {
            console.warn('[AR] Timeout 15s — mostrando UI de todos modos');
            terminarLoader(true); 
        }, 15000);

        viewer.addEventListener('progress', ({ detail }) => {
            const pct = Math.round((detail.totalProgress || 0) * 100);
            if (pct > 0 && !progresReal) {
                progresReal = true;
                barra.classList.remove('sweep'); 
            }
            if (progresReal) barra.style.width = pct + '%';
        });

        viewer.addEventListener('load', () => {
            clearTimeout(timeoutCarga);
            if (!progresReal) {
                barra.classList.remove('sweep');
                barra.style.width = '100%';
            } else {
                barra.style.width = '100%';
            }
            setTimeout(() => terminarLoader(true), 300);
        });

        viewer.addEventListener('error', (e) => {
            clearTimeout(timeoutCarga);
            console.error('[AR] Error modelo:', e);
            terminarLoader(false);
        });

        function terminarLoader(exito) {
            if (loaderEliminado) return;
            loaderEliminado = true;

            loader.classList.add('oculto');
            setTimeout(() => { if (loader.parentNode) loader.remove(); }, 700);

            if (exito) {
                boton.classList.remove('cargando');
                botonTexto.textContent = 'ACTIVAR CÁMARA AR';

                const anims = viewer.availableAnimations || [];
                if (anims.length > 0) {
                    let idx = 0;
                    const siguiente = () => {
                        viewer.animationName = anims[idx];
                        viewer.play({ repetitions: 1 });
                    };
                    viewer.addEventListener('finished', () => {
                        idx = (idx + 1) % anims.length;
                        setTimeout(siguiente, 200);
                    });
                    siguiente();
                }

                if (!viewer.canActivateAR) {
                    boton.classList.add('sin-ar');
                    botonTexto.textContent = '⚠️ AR no disponible';
                    mostrarToast('⚠️ AR no compatible en este dispositivo.');
                }
            } else {
                boton.classList.remove('cargando');
                boton.classList.add('sin-ar');
                botonTexto.textContent = '⚠️ Error al cargar modelo';
                mostrarToast('No se pudo cargar el modelo 3D.<br><small>Verifica tu conexión e intenta de nuevo.</small>');
            }
        }

        boton.addEventListener('click', () => {
            if (boton.classList.contains('cargando') || boton.classList.contains('sin-ar')) return;
            if (!viewer.canActivateAR) {
                mostrarToast('⚠️ AR no compatible.');
                return;
            }
            
            // Pausar rotación automática al entrar a AR
            viewer.autoRotate = false;
            
            // Click fantasma al botón nativo de model-viewer
            arBtn.click();
        });

        function mostrarToast(html) {
            toastMsg.innerHTML = html;
            toast.classList.add('visible');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('visible'), 5000);
        }

    })();
    </script>
</body>
</html>
